name: Renovate
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.20
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          configurationFile: renovate.json
        env:
          RENOVATE_REPOSITORIES: floatpane/loom
